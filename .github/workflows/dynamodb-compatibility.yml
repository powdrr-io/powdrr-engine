name: DynamoDB Compatibility

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Validate Compatibility Fixture File
        run: cargo test -p powdrr_lib --test dynamodb_compatibility_matrix compatibility_matrix_operations_are_complete_and_unique -- --nocapture

      - name: Run DynamoDB Compatibility Matrix
        run: bash scripts/run_dynamodb_compat_local.sh
