name: ES Compatibility

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  compatibility:
    # Requires the Ubicloud Managed Runners GitHub App to be installed
    # for this repository.
    runs-on: ubicloud-standard-2-ubuntu-2404
    timeout-minutes: 45
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      # Keep both steps on the same target dir so rust-cache and the
      # differential script reuse the initial powdrr_lib test build.
      CARGO_TARGET_DIR: target

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/es_js_client/package-lock.json

      - uses: Swatinem/rust-cache@v2

      - name: Validate Compatibility Fixture File
        run: scripts/cargo-worktree.sh test -p powdrr_lib --features integration-tests --test es_compatibility_matrix compatibility_matrix_case_file_parses_and_ids_are_unique -- --nocapture

      - name: Run Differential Compatibility Matrix
        run: POWDRR_SKIP_FIXTURE_VALIDATION=1 bash scripts/run_es_compat_local.sh
