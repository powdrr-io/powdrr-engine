name: ES Mutation Regressions

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: es-mutation-regressions-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regressions:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      # Keep the job on a stable target dir so rust-cache can reuse the build.
      CARGO_TARGET_DIR: target

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run ES mutation regression tests
        run: bash scripts/run_es_mutation_regression_local.sh
