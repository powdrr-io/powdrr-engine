[package]
name = "powdrr-io-service"
description = "Powdrr.io Service"
keywords = ["arrow", "query", "sql"]
publish = false
readme = "README.md"
version.workspace = true
edition.workspace = true


[dependencies]
gotham = { version = "0.7.4", features = ["rustls"] }
idgenerator = "2.0.0"
powdrr_lib = { path = "../main_lib" }
rustls-pemfile = "2.2.0"
rustls-pki-types = "1.12.0"
tracing-subscriber = "0.3.19"
futures = "0.3.31"
futures-util = "0.3.31"
serde_json = "1.0.140"
serde = { version = "1.0.219", features = ["derive"] }
tracing = "0.1.41"
tokio = "1.45.1"
