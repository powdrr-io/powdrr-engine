
[package]
name = "powdrr-io-engine"
description = "Powdrr.io Monolith"
keywords = ["arrow", "query", "sql"]
publish = false
readme = "README.md"
version.workspace = true
edition.workspace = true


[dependencies]
arrow-json = "54.3.1"
arrow-select = "54.3.1"
async-trait = "0.1.88"
aws-smithy-http = "0.39.0"
aws-types = "0.9.0"
chrono = "0.4.41"
datafusion = "46.0.0"
flamegraph = "0.6.8"
flate2 = { version = "1.1.1" }
futures = "0.3.31"
futures-util = "0.3.31"
gotham = { version = "0.7.4", features = ["rustls"] }
gotham_restful = "0.9.0"
http = "0.2.12"
iceberg_lib = { path = "../iceberg_lib" }
idgenerator = "2.0.0"
lazy_static = "1.5.0"
lru = "0.16.0"
minijinja = "2.10.2"
object_store = { version = "0.11.2", features = ["aws", "gcp", "azure", "http"] }
phf = { version = "0.11.3", features = ["macros"] }
rand = "0.9.1"
redis = "0.30.0"
reqwest = { version = "0.12.14", features = ["json", "blocking"] }
rustls-pemfile = "2.2.0"
rustls-pki-types = "1.12.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
tokio = { version = "1.0", features = ["rt-multi-thread"] }
tracing = "0.1.41"
tracing-subscriber = "0.3.19"
ttl_cache = "0.5.1"
url = "2.5.4"
url-escape = "0.1.1"
use = "0.0.1-pre.0"
uuid-b64 = "0.2.0"

