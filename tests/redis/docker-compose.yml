
volumes:
  redis_data:
    driver: local

services:
  powdrr-service:
    image: service:latest
    ports:
      - "7784:7784"
    networks:
      iceberg_net:

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      iceberg_net:

  minio:
    image: minio/minio
    container_name: minio
    networks:
      iceberg_net:
        aliases:
          - warehouse.minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      - ~/code/minio-data:/data
    command: server /data --console-address ":9001"

  createbuckets:
    image: minio/mc
    container_name: minio_bucket_creator
    networks:
      iceberg_net:
    depends_on:
      - minio # Ensure MinIO server is up before attempting to create buckets
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 admin password) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc rm -r --force myminio/warehouse;
      /usr/bin/mc rm -r --force myminio/default;
      /usr/bin/mc mb myminio/warehouse;
      /usr/bin/mc mb myminio/default;
      /usr/bin/mc policy set public myminio/warehouse;
      /usr/bin/mc policy set public myminio/default;
      tail -f /dev/null
      "      

  rest:
    image: tabulario/iceberg-rest
    container_name: iceberg-rest
    networks:
      iceberg_net:
    ports:
      - 8181:8181
    environment:
      CATALOG_WAREHOUSE: s3://warehouse
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password

  localstack:
    image: localstack/localstack@sha256:91271bdd1a2c3e59cd43c97483c1394672c1e4d2e13e883cfac3f832b23b3876 # 3.3.0
    networks:
      iceberg_net:
    volumes:
      - "~/code/dynamodb-data:/var/lib/localstack"
      # - "./localstack:/docker-entrypoint-initaws.d"
      # - "./localstack:/etc/localstack/init/ready.d" # for intel chip Mac
    healthcheck:
      test: awslocal dynamodb list-tables
      interval: 60s
      timeout: 10s
    environment:
      - SERVICES=dynamodb
      - EAGER_SERVICE_LOADING=1
    ports:
      - "4566:4566"

networks:
  iceberg_net:
